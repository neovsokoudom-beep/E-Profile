<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ប្រព័ន្ធ e-Profile | Civil Servant Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Battambang:wght@100;300;400;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg: #eef2f7;
  --card: #ffffff;
  --card-border: #dfe6ee;
  --border: #c8d1dc;
  --input-bg: #f5f8fb;
  --text: #1a2332;
  --text-muted: #5e6e82;
  --label: #3d4f63;
  --accent: #1652c7;
  --accent-light: #d6e4ff;
  --accent-dark: #0e3d99;
  --success: #118a4e;
  --danger: #c62828;
  --sidebar: #0c1729;
  --sidebar-text: #8295ad;
  --sidebar-active: #3b82f6;
  --shadow-sm: 0 1px 3px rgba(12,23,41,.07);
  --shadow-md: 0 4px 16px rgba(12,23,41,.09);
  --radius: 10px;
  --radius-lg: 14px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; scroll-behavior: smooth; }
body {
  font-family: 'Battambang', 'Noto Sans Khmer', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
}
/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #b0bec5; border-radius: 3px; }

/* ─── Sidebar ─── */
.sidebar {
  width: 256px; min-width: 256px;
  background: var(--sidebar);
  display: flex; flex-direction: column;
  position: fixed; top: 0; left: 0; bottom: 0;
  z-index: 100;
  transition: transform .3s cubic-bezier(.4,0,.2,1);
}
.sidebar.closed { transform: translateX(-100%); }
.sidebar-header {
  padding: 20px 20px 18px;
  border-bottom: 1px solid rgba(255,255,255,.06);
  display: flex; align-items: center; gap: 12px;
}
.sidebar-logo {
  width: 42px; height: 42px; border-radius: 12px;
  background: rgba(59,130,246,.13);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
}
.sidebar-title { color: #fff; font-size: 13px; font-weight: 700; line-height: 1.3; }
.sidebar-sub { color: var(--sidebar-text); font-size: 11px; }
.sidebar-nav { flex: 1; padding: 14px 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 3px; }
.nav-btn {
  display: flex; align-items: center; gap: 11px;
  padding: 11px 14px; border-radius: var(--radius);
  border: none; background: transparent;
  color: var(--sidebar-text); font-size: 13px;
  font-family: inherit; cursor: pointer;
  transition: all .2s; text-align: left; position: relative;
}
.nav-btn:hover { background: rgba(255,255,255,.05); color: #c8d6e5; }
.nav-btn.active {
  background: rgba(59,130,246,.13); color: #60a5fa; font-weight: 700;
}
.nav-btn.active::after {
  content: ''; position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  width: 6px; height: 6px; border-radius: 50%; background: #60a5fa;
}
.nav-icon { font-size: 16px; width: 22px; text-align: center; }
.sidebar-footer {
  padding: 14px 20px;
  border-top: 1px solid rgba(255,255,255,.06);
  color: var(--sidebar-text); font-size: 11px;
}
.overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 90;
}
.overlay.show { display: block; }

/* ─── Mobile Header ─── */
.mobile-header {
  display: none; position: fixed; top: 0; left: 0; right: 0; z-index: 80;
  background: var(--sidebar); padding: 12px 16px;
  justify-content: space-between; align-items: center;
}
.mobile-header .logo-row { display: flex; align-items: center; gap: 8px; }
.mobile-header .logo-row span:first-child { font-size: 20px; }
.mobile-header .logo-row span:last-child { color: #fff; font-size: 13px; font-weight: 700; }
.hamburger {
  background: none; border: none; color: #fff; font-size: 24px; cursor: pointer;
}

/* ─── Main ─── */
.main {
  flex: 1; margin-left: 256px; min-width: 0;
}
.topbar {
  position: sticky; top: 0; z-index: 50;
  background: rgba(238,242,247,.88); backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--card-border);
  padding: 16px 32px; display: flex; align-items: center; justify-content: space-between;
}
.topbar-title { font-size: 18px; font-weight: 700; }
.topbar-step { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.step-dots { display: flex; gap: 6px; }
.step-dot {
  width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; border: 1px solid var(--card-border);
  background: var(--card); color: var(--text-muted);
  cursor: pointer; transition: all .2s;
}
.step-dot.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.step-dot.done { background: var(--accent-light); color: var(--accent); border-color: var(--accent-light); }

.content { padding: 28px 32px; max-width: 900px; margin: 0 auto; }

/* ─── Card ─── */
.card {
  background: var(--card); border: 1px solid var(--card-border);
  border-radius: var(--radius-lg); padding: 28px;
  box-shadow: var(--shadow-sm);
  animation: fadeUp .35s ease-out;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }

/* ─── Form Elements ─── */
.form-grid { display: grid; gap: 16px; }
.cols-2 { grid-template-columns: 1fr 1fr; }
.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
.cols-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
.field { display: flex; flex-direction: column; gap: 4px; }
.field label { font-size: 12px; font-weight: 500; color: var(--label); }
.field input, .field select, .field textarea {
  height: 40px; border-radius: var(--radius); border: 1px solid var(--border);
  padding: 0 12px; font-size: 13px; font-family: inherit;
  background: var(--input-bg); color: var(--text);
  outline: none; transition: border-color .2s, box-shadow .2s;
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light);
}
.field textarea { height: auto; padding: 10px 12px; resize: none; }
.field input:disabled, .field select:disabled { opacity: .4; cursor: not-allowed; }

/* ─── Section Label ─── */
.section-label {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .06em; color: var(--accent); margin-top: 8px; margin-bottom: 4px;
}

/* ─── Radio / Checkbox Groups ─── */
.radio-group, .check-group { display: flex; flex-wrap: wrap; gap: 16px; align-items: center; }
.radio-group label, .check-group label {
  display: flex; align-items: center; gap: 6px;
  font-size: 13px; cursor: pointer; color: var(--text);
}
.radio-group input, .check-group input { accent-color: var(--accent); width: 16px; height: 16px; }

/* ─── Photo Upload ─── */
.photo-box {
  width: 128px; height: 160px; border-radius: var(--radius-lg);
  border: 2px dashed var(--border); background: var(--input-bg);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; position: relative;
}
.photo-box img { width: 100%; height: 100%; object-fit: cover; }
.photo-box .placeholder { font-size: 40px; opacity: .2; }
.photo-btn {
  display: inline-block; margin-top: 8px; padding: 6px 14px;
  background: var(--accent); color: #fff; border-radius: 8px;
  font-size: 12px; font-weight: 600; cursor: pointer; transition: background .2s;
}
.photo-btn:hover { background: var(--accent-dark); }

/* ─── File Upload ─── */
.file-upload {
  display: flex; align-items: center; gap: 10px;
  border: 1px dashed var(--border); border-radius: var(--radius);
  padding: 12px 16px; cursor: pointer; transition: border-color .2s;
  background: var(--input-bg);
}
.file-upload:hover { border-color: var(--accent); }
.file-upload svg { color: var(--accent); flex-shrink: 0; }
.file-upload span { font-size: 13px; color: var(--text-muted); }
.file-upload input { display: none; }

/* ─── Buttons ─── */
.footer-bar {
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 12px;
  margin-top: 20px; padding-top: 20px;
  border-top: 1px solid var(--card-border);
}
.btn {
  padding: 10px 22px; border-radius: var(--radius); border: none;
  font-size: 13px; font-weight: 700; font-family: inherit;
  cursor: pointer; transition: all .2s; display: inline-flex; align-items: center; gap: 6px;
}
.btn:active { transform: scale(.96); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-dark); box-shadow: var(--shadow-md); }
.btn-success { background: var(--success); color: #fff; }
.btn-success:hover { background: #0d7a42; box-shadow: var(--shadow-md); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { background: #a92222; box-shadow: var(--shadow-md); }
.btn-outline {
  background: var(--card); color: var(--text); border: 1px solid var(--card-border);
}
.btn-outline:hover { background: var(--input-bg); }

.nav-footer { display: flex; justify-content: space-between; margin-top: 24px; }

/* ─── Employee Record ─── */
.emp-record { margin-top: 16px; }
.emp-record label { font-size: 12px; font-weight: 500; color: var(--label); }
.emp-record textarea {
  width: 100%; margin-top: 4px; border-radius: var(--radius);
  border: 1px solid var(--border); padding: 10px 12px; font-size: 13px;
  font-family: inherit; background: var(--input-bg); color: var(--text);
  resize: none; outline: none; transition: border-color .2s, box-shadow .2s;
}
.emp-record textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }

/* ─── Address ─── */
.address-block { margin-top: 4px; }

/* ─── Toast ─── */
.toast {
  position: fixed; top: 20px; right: 20px; z-index: 999;
  padding: 14px 22px; border-radius: var(--radius-lg); color: #fff;
  font-size: 13px; font-weight: 600;
  box-shadow: 0 8px 30px rgba(0,0,0,.18);
  animation: slideIn .3s ease-out;
  display: none; align-items: center; gap: 8px;
}
.toast.show { display: flex; }
.toast.success { background: var(--success); }
.toast.error { background: var(--danger); }
.toast .close-toast { background:none; border:none; color:#fff; font-size:16px; cursor:pointer; opacity:.7; margin-left:8px; }
.toast .close-toast:hover { opacity:1; }
@keyframes slideIn { from { transform: translateX(100px); opacity:0; } to { transform: translateX(0); opacity:1; } }

/* ─── Date Row ─── */
.date-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.date-col { display: flex; flex-direction: column; gap: 4px; }
.date-col label { font-size: 12px; font-weight: 500; color: var(--label); }
.date-inner { display: flex; align-items: center; gap: 8px; }
.date-inner input[type="date"], .date-inner input[type="number"] {
  flex: 1; height: 40px; border-radius: var(--radius); border: 1px solid var(--border);
  padding: 0 12px; font-size: 13px; font-family: inherit;
  background: var(--input-bg); color: var(--text); outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.date-inner input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
.date-check { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-muted); white-space: nowrap; cursor: pointer; }
.date-check input { accent-color: var(--accent); }

/* ─── Ministry Block ─── */
.ministry-row { display: flex; align-items: flex-end; gap: 12px; flex-wrap: wrap; }
.ministry-row .field { flex: 1; min-width: 200px; }
.ministry-radios { display: flex; gap: 14px; padding-bottom: 6px; }
.sub-fields { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }

/* ─── Skill Radio ─── */
.skill-row { display: flex; flex-direction: column; gap: 4px; }
.skill-row > label { font-size: 12px; font-weight: 500; color: var(--label); }
.skill-opts { display: flex; gap: 18px; }
.skill-opts label { display: flex; align-items: center; gap: 5px; font-size: 13px; cursor: pointer; }
.skill-opts input { accent-color: var(--accent); }

/* ─── Panel visibility ─── */
.panel { display: none; }
.panel.active { display: block; }

/* ─── Export Toolbar ─── */
.export-toolbar {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  padding: 16px 24px; margin-bottom: 20px;
  background: var(--card); border: 1px solid var(--card-border);
  border-radius: var(--radius-lg); box-shadow: var(--shadow-sm);
}
.export-toolbar .toolbar-label {
  font-size: 12px; font-weight: 700; color: var(--label);
  margin-right: 4px; display: flex; align-items: center; gap: 6px;
}
.export-toolbar .toolbar-label svg { color: var(--accent); }
.btn-export {
  padding: 9px 18px; border-radius: 8px; border: 1px solid var(--card-border);
  font-size: 12px; font-weight: 600; font-family: inherit;
  cursor: pointer; transition: all .2s; display: inline-flex; align-items: center; gap: 7px;
  background: var(--card); color: var(--text);
}
.btn-export:hover { background: var(--accent-light); border-color: var(--accent); color: var(--accent); box-shadow: var(--shadow-sm); }
.btn-export:active { transform: scale(.96); }
.btn-export svg { width: 16px; height: 16px; }
.btn-export.data-btn { border-left: 3px solid #0d9488; }
.btn-export.report-btn { border-left: 3px solid var(--accent); }
.btn-export.backup-btn { border-left: 3px solid #d97706; }

/* ─── Profile top section ─── */
.profile-top { display: flex; gap: 24px; }
.profile-fields { flex: 1; display: flex; flex-direction: column; gap: 12px; }
.profile-photo { display: flex; flex-direction: column; align-items: center; gap: 8px; }

/* ─── Responsive ─── */
@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .mobile-header { display: flex; }
  .main { margin-left: 0; padding-top: 52px; }
  .topbar { padding: 14px 16px; }
  .content { padding: 16px; }
  .card { padding: 20px; }
  .cols-2, .cols-3, .cols-4 { grid-template-columns: 1fr; }
  .date-row { grid-template-columns: 1fr; }
  .step-dots { display: none; }
  .profile-top { flex-direction: column; }
  .footer-bar { flex-direction: column; align-items: stretch; }
  .footer-bar .btn { text-align: center; justify-content: center; }
}
</style>
</head>
<body>

<!-- Mobile Header -->
<div class="mobile-header">
  <div class="logo-row"><span>🇰🇭</span><span>ប្រព័ន្ធ e-Profile</span></div>
  <button class="hamburger" onclick="toggleSidebar()">☰</button>
</div>

<!-- Overlay -->
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">🇰🇭</div>
    <div>
      <div class="sidebar-title">ប្រព័ន្ធគ្រប់គ្រង</div>
      <div class="sidebar-sub">e-Profile Portal</div>
    </div>
  </div>
  <nav class="sidebar-nav" id="sidebarNav"></nav>
  <div class="sidebar-footer">© ២០២៦ ព័ត៌មានវិទ្យា</div>
</aside>

<!-- Main -->
<div class="main">
  <div class="topbar">
    <div>
      <div class="topbar-title" id="topTitle"></div>
      <div class="topbar-step" id="topStep"></div>
    </div>
    <div class="step-dots" id="stepDots"></div>
  </div>
  <div class="content">
    <!-- Export Toolbar -->
    <div class="export-toolbar">
      <div class="toolbar-label">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>
        នាំចេញ Excel
      </div>
      <button class="btn-export data-btn" onclick="exportExcelData()">
        <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.375 19.5h17.25m-17.25 0a1.125 1.125 0 0 1-1.125-1.125M3.375 19.5h7.5c.621 0 1.125-.504 1.125-1.125m-9.75 0V5.625m0 12.75v-1.5c0-.621.504-1.125 1.125-1.125m18.375 2.625V5.625m0 12.75c0 .621-.504 1.125-1.125 1.125m1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125m0 3.75h-7.5A1.125 1.125 0 0 1 12 18.375m9.75-12.75c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125m19.5 0v1.5c0 .621-.504 1.125-1.125 1.125M2.25 5.625v1.5c0 .621.504 1.125 1.125 1.125m0 0h17.25m-17.25 0h7.5c.621 0 1.125.504 1.125 1.125M3.375 8.25c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125m17.25-3.75h-7.5c-.621 0-1.125.504-1.125 1.125m8.625-1.125c.621 0 1.125.504 1.125 1.125v1.5c0 .621-.504 1.125-1.125 1.125"/></svg>
        📊 នាំចេញទិន្នន័យ (Data)
      </button>
      <button class="btn-export report-btn" onclick="exportExcelReport()">
        <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z"/></svg>
        📋 នាំចេញរបាយការណ៍ (Report)
      </button>
      <button class="btn-export backup-btn" onclick="exportExcelBackup()">
        <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20.25 6.375c0 2.278-3.694 4.125-8.25 4.125S3.75 8.653 3.75 6.375m16.5 0c0-2.278-3.694-4.125-8.25-4.125S3.75 4.097 3.75 6.375m16.5 0v11.25c0 2.278-3.694 4.125-8.25 4.125s-8.25-1.847-8.25-4.125V6.375m16.5 0v3.75c0 2.278-3.694 4.125-8.25 4.125s-8.25-1.847-8.25-4.125v-3.75"/></svg>
        💾 បម្រុងទុកទិន្នន័យ (Backup)
      </button>
    </div>
    <div class="card" id="cardContainer"></div>
    <div class="nav-footer">
      <button class="btn btn-outline" id="prevBtn" onclick="goPanel(-1)">← មុន</button>
      <button class="btn btn-primary" id="nextBtn" onclick="goPanel(1)">បន្ទាប់ →</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"><span id="toastIcon"></span><span id="toastMsg"></span><button class="close-toast" onclick="hideToast()">✕</button></div>

<script>

// ─── Helpers ───
function opts(arr) { return '<option value="">-- ជ្រើសរើស --</option>' + arr.map(a => `<option value="${a}">${a}</option>`).join(''); }
function field(label, inner, cls='') { return `<div class="field ${cls}"><label>${label}</label>${inner}</div>`; }
function input(id, type='text', ph='') { return `<input type="${type}" id="${id}" placeholder="${ph}">`; }
function select(id, options) { return `<select id="${id}">${opts(options)}</select>`; }
function textarea(id, rows=3) { return `<textarea id="${id}" rows="${rows}"></textarea>`; }
function radioGroup(name, options) {
  return `<div class="radio-group">${options.map(o => `<label><input type="radio" name="${name}" value="${o}"> ${o}</label>`).join('')}</div>`;
}
function datePicker(prefix) {
  return `<div class="date-row">
    <div class="date-col"><label>ថ្ងៃខែឆ្នាំចាប់ផ្តើម</label>
      <div class="date-inner"><input type="date" id="${prefix}_start">
        <label class="date-check"><input type="checkbox" id="${prefix}_sy"> ឆ្នាំចាប់ផ្តើម</label></div></div>
    <div class="date-col"><label>ថ្ងៃខែឆ្នាំបញ្ចប់</label>
      <div class="date-inner"><input type="date" id="${prefix}_end">
        <label class="date-check"><input type="checkbox" id="${prefix}_ey"> ឆ្នាំបញ្ចប់</label>
        <label class="date-check"><input type="checkbox" id="${prefix}_nf"> មិនទាន់បញ្ចប់</label></div></div></div>`;
}
function addressBlock(prefix, label) {
  return `<div class="section-label">${label}</div><div class="address-block">
    <div class="form-grid cols-4">${field('រាជធានី/ខេត្ត',select(prefix+'_prov',PROVINCES))}${field('ខណ្ឌ/ស្រុក/ក្រុង',input(prefix+'_dist'))}${field('សង្កាត់/ឃុំ',input(prefix+'_comm'))}${field('ភូមិ',input(prefix+'_vill'))}</div>

}
function ministryBlock(prefix) {
  return `<div class="ministry-row">
      ${field('ក្រសួង',select(prefix+'_min',MINISTRIES))}
      <div class="ministry-radios">

function fileUpload(id) {
  return `<div class="field"><label>ឯកសារភ្ជាប់</label>

      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 16.5V9.75m0 0 3 3m-3-3-3 3M6.75 19.5a4.5 4.5 0 0 1-.87-8.92A6 6 0 0 1 18.06 10a4.5 4.5 0 0 1-.96 8.5H6.75Z"/></svg>

    </label></div>`;
}

const panelBuilders = [buildInfo, buildFamily, buildWork, buildFramework, buildAdditional, buildEducation, buildLanguage];

// ─── Render ───
function renderSidebar() {
  const nav = document.getElementById('sidebarNav');
  nav.innerHTML = PANELS.map((p,i) => `<button class="nav-btn ${i===currentPanel?'active':''}" onclick="goTo(${i})"><span class="nav-icon">${p.icon}</span><span>${p.label}</span></button>`).join('');
}

function renderSteps() {
  const dots = document.getElementById('stepDots');
  dots.innerHTML = PANELS.map((p,i) => `<div class="step-dot ${i===currentPanel?'active':i<currentPanel?'done':''}" onclick="goTo(${i})">${i+1}</div>`).join('');
}

function renderPanel() {
  const p = PANELS[currentPanel];
  document.getElementById('topTitle').textContent = p.icon + ' ' + p.label;
  document.getElementById('topStep').textContent = `ជំហានទី ${currentPanel+1} នៃ ${PANELS.length}`;
  const card = document.getElementById('cardContainer');
  card.style.animation = 'none';
  card.offsetHeight; // reflow
  card.style.animation = 'fadeUp .35s ease-out';
  card.innerHTML = panelBuilders[currentPanel]();
  document.getElementById('prevBtn').disabled = currentPanel === 0;
  document.getElementById('prevBtn').style.opacity = currentPanel === 0 ? '.35' : '1';
  document.getElementById('nextBtn').disabled = currentPanel === PANELS.length - 1;
  document.getElementById('nextBtn').style.opacity = currentPanel === PANELS.length - 1 ? '.35' : '1';
  renderSidebar();
  renderSteps();
}

function goTo(idx) {
  currentPanel = idx;
  renderPanel();
  closeSidebar();
  window.scrollTo({top:0,behavior:'smooth'});
}

function goPanel(dir) {
  const next = currentPanel + dir;
  if (next >= 0 && next < PANELS.length) goTo(next);
}

// ─── Photo Preview ───
function previewPhoto(input) {
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = function(e) {
      const box = document.getElementById('photoBox');
      box.innerHTML = `<img src="${e.target.result}" alt="photo">`;
    };
    reader.readAsDataURL(input.files[0]);
  }
}

// ─── Toast ───
function showToast(msg, type) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  document.getElementById('toastIcon').textContent = type === 'success' ? '✓' : '✗';
  t.className = 'toast show ' + type;
  clearTimeout(t._timer);
  t._timer = setTimeout(hideToast, 3000);
}
function hideToast() { document.getElementById('toast').className = 'toast'; }

// ─── Sidebar Mobile ───
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('overlay');
  const isOpen = sb.classList.contains('open');
  if (isOpen) { sb.classList.remove('open'); ov.classList.remove('show'); }
  else { sb.classList.add('open'); ov.classList.add('show'); }
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

function v(id) { var el = document.getElementById(id); return el ? el.value || '' : ''; }

function getTimestamp() { var d=new Date(); return d.getFullYear()+''+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0')+'_'+String(d.getHours()).padStart(2,'0')+String(d.getMinutes()).padStart(2,'0'); }

function addKVSheet(wb, sheetName, title, kvPairs) {
  var data = [[title],[""],["Field","Value"]];
  kvPairs.forEach(function(r){ data.push(r); });
  var ws = XLSX.utils.aoa_to_sheet(data);
  setColWidths(ws, [44, 44]);
  XLSX.utils.book_append_sheet(wb, ws, sheetName.substring(0,31));
}

  var summary = [
    ["Panel","Key Fields Summary"],
    ["Officer Info", (d.info.lastNameKh||'')+' '+(d.info.firstNameKh||'')+' | ID: '+(d.info.officerId||'N/A')+' | Phone: '+(d.info.phone||'N/A')],
    ["Family", (d.family.relation||'N/A')+': '+(d.family.lastNameKh||'')+' '+(d.family.firstNameKh||'')],
    ["Work History", (d.work.ministry||'N/A')+' | '+(d.work.position||'N/A')],
    ["Framework", (d.framework.type||'N/A')+' | '+(d.framework.rank||'N/A')+' '+(d.framework.grade||'')],
    ["Additional", (d.additional.position||'N/A')+' | '+(d.additional.ministry||'N/A')],
    ["Education", (d.education.degree||'N/A')+' | '+(d.education.major||'N/A')+' | '+(d.education.institution||'N/A')],
    ["Language", (d.language.language||'N/A')+' R:'+(d.language.reading||'-')+' W:'+(d.language.writing||'-')+' L:'+(d.language.listening||'-')+' S:'+(d.language.speaking||'-')],
  ];
  var wsSummary = XLSX.utils.aoa_to_sheet(summary);
  setColWidths(wsSummary, [25, 80]);
  XLSX.utils.book_append_sheet(wb, wsSummary, "_SUMMARY");

  XLSX.writeFile(wb, "eProfile_Backup_" + getTimestamp() + ".xlsx");
  showToast("\u1794\u1798\u17D2\u179A\u17BB\u1784\u1791\u17BB\u1780 Backup \u178A\u17C4\u1799\u1787\u17C4\u1782\u1787\u17D0\u1799!", "success");
}

// ─── Init ───
renderPanel();
</script>
